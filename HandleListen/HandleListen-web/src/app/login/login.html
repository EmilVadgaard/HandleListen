<h2>Login</h2>

<input [(ngModel)]="email" type="email" placeholder="Email" />
<input [(ngModel)]="password" type="password" placeholder="Password" />
<button (click)="login()">Login</button>
<br/>
<a href="/register">Don't have an account? Register here.</a>
@if (errorMessage()) {
    <p>{{ errorMessage() }}</p>
}
